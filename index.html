<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <title>Document</title>
</head>

<body>

    <nav class="navbar" style="background-color: gainsboro;">
        <div class="container">
            <a class="navbar-brand" href="#">
                <img src="./assects/slack.png" alt="Bootstrap" width="30" height="24">
            </a>
        </div>
    </nav>

    <!-- Form -->



    <div class="container vh-100 d-flex justify-content-center align-items-center">
        <div class="card p-4 shadow" style="width: 500px;">
            <form>

                <div class="mb-3">
                    <label for="number" class="form-label">CNIC Number</label>
                    <input type="number" class="form-control" id="name" placeholder="Enter your CNIC Number">
                </div>
                <div class="mb-3">
                    <label for="password" class="form-label">Password</label>
                    <input type="password" class="form-control" id="email" placeholder="Enter your password">
                </div>
                <button type="submit" class="btn btn-primary"><a href="./form.html"
                        class="btn btn-primary">Submit</a></button>

            </form>

        </div>
    </div>






    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>
</body>

</html>
